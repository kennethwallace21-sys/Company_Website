<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070c18"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2f7bff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2f7bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="1010" cy="70" rx="560" ry="400" fill="url(#glow)"/>

  <!-- brand row -->
  <g transform="translate(80,82)">
    <rect x="0" y="0" width="30" height="30" rx="8" fill="url(#accent)"/>
    <path d="M9 15 L15 9 M9 15 L15 21 M9 15 H22" stroke="#06101f" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="21" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700"
      letter-spacing="3" fill="#eaf1fb">CATALYST APPLIED AI</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700"
    letter-spacing="4" fill="#5aa2ff">PRODUCTION AI · GOVERNMENT &amp; ENTERPRISE READY</text>

  <!-- headline -->
  <text x="78" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="74" font-weight="800"
    letter-spacing="-1" fill="#f3f7fc">Production AI, deployed</text>
  <text x="78" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="74" font-weight="800"
    letter-spacing="-1" fill="url(#accent)">inside your environment.</text>

  <!-- subline -->
  <text x="80" y="508" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#9fb2cc">RAG · agentic
    workflows · workforce intelligence · domain-trained AI agents.</text>

  <!-- footer -->
  <text x="80" y="572" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600"
    letter-spacing="1" fill="#6b86a8">Deployed in your environment · Production-ready from day one · NVIDIA Inception Member</text>
</svg>
